name: CI / Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ─── Job 1: Lint ───────────────────────────────────────────────────────────
  # Prerequisite: run `ng add angular-eslint` locally and commit the changes.
  # Until that's done, comment this job out and remove `needs: lint` from test.
  # lint:
  #   name: Lint
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4.2.2

  #     - name: Set up Node 22
  #       uses: actions/setup-node@v4.4.0
  #       with:
  #         node-version: 22
  #         cache: npm

  #     - name: Install dependencies
  #       run: npm ci

  #     - name: Run lint
  #       run: npx ng lint

  # ─── Job 2: Test ───────────────────────────────────────────────────────────
  # Angular v20 uses Web Test Runner (not Karma).
  # --no-watch is the only flag needed — no --browsers or --progress.
  # test:
  #   name: Test
  #   runs-on: ubuntu-latest
  #   needs: lint
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4.2.2

  #     - name: Set up Node 22
  #       uses: actions/setup-node@v4.4.0
  #       with:
  #         node-version: 22
  #         cache: npm

  #     - name: Install dependencies
  #       run: npm ci

  #     - name: Generate environment file
  #       run: |
  #         mkdir -p src/environments
  #         cat > src/environments/environment.ts << ENVEOF
  #         export const environment = {
  #           production: true,
  #           web3formsKey: '${{ secrets.WEB3FORMS_KEY }}',
  #           web3Fromslink: '${{ secrets.WEB3FORMS_URL }}'
  #         };
  #         ENVEOF

  #     - name: Run tests
  #       run: npx ng test

  # ─── Job 3: Build + Deploy ─────────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    # needs: [lint]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Node 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate environment file
        run: |
          mkdir -p src/environments
          touch src/environments/environment.ts
          cat > src/environments/environment.ts << ENVEOF
          export const environment = {
            production: true,
            web3formsKey: '${{ secrets.WEB3FORMS_KEY }}',
            web3Fromslink: '${{ secrets.WEB3FORMS_URL }}'
          };
          ENVEOF

      - name: Build
        run: npx ng build --base-href /my-portfolio/ --configuration production

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5.0.0

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: dist/portfolio/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5