name: CI / Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Build + Deploy
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    # needs: [lint]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Node 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate environment file
        run: |
          mkdir -p src/environments
          printf 'export const environment = {\n  production: true,\n  web3formsKey: "%s",\n  web3Fromslink: "%s"\n};\n' \
            "${{ secrets.WEB3FORMS_KEY }}" \
            "${{ secrets.WEB3FORMS_URL }}" \
            > src/environments/environment.ts

      - name: Build
        run: npx ng build --base-href /my-portfolio/ --configuration production

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5.0.0

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: dist/portfolio/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5