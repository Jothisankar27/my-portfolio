name: CI / Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Node 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate environment file
        run: |
          mkdir -p src/environments
          touch src/environments/environment.ts
          cat > src/environments/environment.ts << ENVEOF
          export const environment = {
            production: true,
            web3formsKey: '${{ secrets.WEB3FORMS_KEY }}',
            web3Fromslink: 'https://api.web3forms.com/submit'
          };
          ENVEOF

      - name: Build
        run: npx ng build --base-href /my-portfolio/ --configuration production

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5.0.0

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: dist/portfolio/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5