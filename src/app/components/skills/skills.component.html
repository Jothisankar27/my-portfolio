<div class="section-alt-bg">
  <section class="section-wrap" id="skills">

    <div class="section-header">
      <span class="section-num">03</span>
      <h2>Technical Skills & Tools</h2>
    </div>

    <!-- 3-tier proficiency matrix -->
    <div class="matrix-section">
      @for (tier of tiers; track tier.label) {
        <div class="matrix-tier">
          <div class="tier-header">
            <span class="tier-dot" [attr.data-tier]="tier.key"></span>
            <span class="tier-label">{{ tier.label }}</span>
            <span class="tier-desc">{{ tier.desc }}</span>
          </div>
          <div class="tier-pills">
            @for (skill of tier.skills; track skill) {
              <span class="tier-pill" [attr.data-tier]="tier.key">{{ skill }}</span>
            }
          </div>
        </div>
      }
    </div>

    <!-- Pills — architecture, tools, design -->
    <div class="skills-grid">
      @for (g of groups; track g.heading) {
        <div class="skill-group">
          <h4>{{ g.heading }}</h4>
          <div class="skill-list">
            @for (item of g.items; track item) {
              <span>{{ item }}</span>
            }
          </div>
        </div>
      }
    </div>

  </section>
</div>
