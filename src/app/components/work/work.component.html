<section class="section-wrap" id="work">
  <div class="section-header">
    <span class="section-num">01</span>
    <h2>Work Experience</h2>
  </div>

  <div class="projects">
    <article class="project-card reveal" #card *ngFor="let proj of projects">
      <div class="project-top">
        <span class="project-tag">{{ proj.tag }}</span>
        <span class="project-stack">{{ proj.stack }}</span>
      </div>
      <h3 class="project-title">{{ proj.title }}
        <!-- {{ proj.titleLine2 }} -->
      </h3>
      <p class="project-desc">{{ proj.desc }}</p>
      <ul class="project-bullets">
        <li *ngFor="let b of proj.bullets">{{ b }}</li>
      </ul>
      <div class="project-footer" *ngIf="proj.award">
        <span class="project-award">{{ proj.award }}</span>
      </div>
    </article>
  </div>
</section>
