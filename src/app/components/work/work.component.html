<section class="section-wrap" id="work">
  <div class="section-header">
    <span class="section-num">01</span>
    <h2>Work Experience</h2>
  </div>

  <div class="projects">
    <article class="project-card reveal" #card *ngFor="let p of projects">
      <div class="project-top">
        <span class="project-tag">{{ p.tag }}</span>
        <span class="project-stack">{{ p.stack }}</span>
      </div>
      <h3 class="project-title">{{ p.title }}
        <!-- {{ p.titleLine2 }} -->
      </h3>
      <p class="project-desc">{{ p.desc }}</p>
      <ul class="project-bullets">
        <li *ngFor="let b of p.bullets">{{ b }}</li>
      </ul>
      <div class="project-footer" *ngIf="p.award">
        <span class="project-award">{{ p.award }}</span>
      </div>
    </article>
  </div>
</section>
