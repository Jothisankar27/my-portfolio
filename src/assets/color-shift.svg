<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#534AB7">
        <animate attributeName="stop-color"
          values="#534AB7;#3C3489;#7F77DD;#993556;#534AB7;#26215C;#AFA9EC;#534AB7"
          dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#26215C">
        <animate attributeName="stop-color"
          values="#26215C;#AFA9EC;#3C3489;#CECBF6;#993556;#534AB7;#26215C;#26215C"
          dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EEEDFE">
        <animate attributeName="stop-color"
          values="#EEEDFE;#CECBF6;#ffffff;#F4C0D1;#EEEDFE;#AFA9EC;#EEEDFE"
          dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#AFA9EC">
        <animate attributeName="stop-color"
          values="#AFA9EC;#ffffff;#CECBF6;#ED93B1;#AFA9EC;#EEEDFE;#AFA9EC"
          dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#AFA9EC">
        <animate attributeName="stop-color"
          values="#AFA9EC;#7F77DD;#CECBF6;#D4537E;#AFA9EC;#534AB7;#AFA9EC"
          dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7F77DD">
        <animate attributeName="stop-color"
          values="#7F77DD;#AFA9EC;#534AB7;#993556;#7F77DD;#CECBF6;#7F77DD"
          dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <style>
      @keyframes spinA { to { transform: rotate(360deg); } }
      @keyframes spinB { to { transform: rotate(-360deg); } }
      @keyframes floatCard { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
      @keyframes pulse { 0%,100%{opacity:0.2} 50%{opacity:0.5} }
      .ring-a { animation: spinA 8s linear infinite; transform-origin: 50px 50px; }
      .ring-b { animation: spinB 5s linear infinite; transform-origin: 50px 50px; }
      .card-g { animation: floatCard 3s ease-in-out infinite; }
      .glow-bg { animation: pulse 3s ease-in-out infinite; transform-origin: 50px 50px; }
    </style>
  </defs>

  <!-- Background circle with color shift -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGrad)"/>

  <!-- Soft glow behind card -->
  <circle class="glow-bg" cx="50" cy="50" r="32" fill="white" opacity="0.1"/>

  <!-- Spinning outer ring -->
  <circle class="ring-a" cx="50" cy="50" r="44"
    fill="none" stroke="url(#borderGrad)" stroke-width="1"
    stroke-dasharray="10 6" opacity="0.5"/>

  <!-- Spinning inner ring -->
  <circle class="ring-b" cx="50" cy="50" r="38"
    fill="none" stroke="url(#borderGrad)" stroke-width="0.7"
    stroke-dasharray="5 9" opacity="0.35"/>

  <!-- Card -->
  <g class="card-g">
    <rect x="22" y="26" width="56" height="48" rx="11"
      fill="#0e0720" fill-opacity="0.72"/>
    <rect x="22" y="26" width="56" height="48" rx="11"
      fill="none" stroke="url(#borderGrad)" stroke-width="1.5"/>

    <!-- Top dots -->
    <circle cx="32" cy="35.5" r="2.5">
      <animate attributeName="fill" values="#AFA9EC;#7F77DD;#CECBF6;#D4537E;#AFA9EC" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="35.5" r="2.5">
      <animate attributeName="fill" values="#7F77DD;#AFA9EC;#534AB7;#993556;#7F77DD" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="48" cy="35.5" r="2.5" fill="#534AB7" opacity="0.5"/>

    <!-- Divider -->
    <line x1="24" y1="42" x2="76" y2="42" stroke="url(#borderGrad)" stroke-width="0.5" opacity="0.5"/>

    <!-- JS text with color shift -->
    <text x="50" y="66"
      text-anchor="middle"
      font-family="'Courier New', Courier, monospace"
      font-size="26" font-weight="900"
      fill="url(#textGrad)"
      letter-spacing="3">JS</text>

    <!-- Corner brackets -->
    <path d="M27 30 L23 30 L23 34" fill="none" stroke="url(#borderGrad)" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M73 66 L77 66 L77 62" fill="none" stroke="url(#borderGrad)" stroke-width="1.3" stroke-linecap="round"/>
  </g>
</svg>
