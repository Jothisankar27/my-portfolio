<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#d8b4fe"/>
    </linearGradient>
    <filter id="glow3" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#7c3aed" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="13" fill="url(#bg3)" filter="url(#glow3)"/>
  <rect x="2" y="2" width="60" height="26" rx="13" fill="white" fill-opacity="0.07"/>
  <!-- Phone body -->
  <rect x="22" y="10" width="20" height="34" rx="4" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Screen -->
  <rect x="25" y="14" width="14" height="22" rx="2" fill="white" fill-opacity="0.25"/>
  <!-- Home button -->
  <circle cx="32" cy="49" r="2.5" fill="white" fill-opacity="0.9"/>
  <!-- Signal waves coming from phone -->
  <path d="M46 22 Q51 27 46 32" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M49 19 Q57 27 49 35" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Speaker grill line -->
  <line x1="29" y1="13" x2="35" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
